# Build Linux amd64, publish .tar.xz + bare binary to GitHub Releases.
# - Push tag v*: create/update release for that tag.
# - workflow_dispatch: create git tag + release at current commit (input tag name).
name: Release Workflow for Reddock

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to create and release (e.g. v1.2.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Compute version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.tag }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="$(git rev-list --count HEAD)-$(date +%d%m%y)"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Test
        run: go test ./...

      - name: Static binary and tarball
        run: |
          make static VERSION="$VERSION"
          make dist-pack VERSION="$VERSION"

      - name: Stage standalone binary for upload
        run: |
          mkdir -p dist
          cp -f reddock dist/reddock
          chmod +x dist/reddock

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reddock-${{ env.VERSION }}
          path: |
            dist/reddock-${{ env.VERSION }}-linux-amd64.tar.xz
            dist/reddock

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${VERSION}"
          TAR="dist/reddock-${VERSION}-linux-amd64.tar.xz"
          BIN="dist/reddock"
          test -f "$TAR"
          test -f "$BIN"

          # Idempotent: existing release → replace assets; else create tag (if missing) + release.
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "$TAR" "$BIN" --clobber
          else
            gh release create "${TAG}" "$TAR" "$BIN" \
              --title "Reddock ${TAG}" \
              --generate-notes
          fi
