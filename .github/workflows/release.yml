# Build Linux amd64 binaries and attach them to GitHub Releases (tag push) or as workflow artifacts.
name: Release Workflow for Reddock

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Compute version
        id: ver
        run: |
          VERSION="$(git rev-list --count HEAD)-$(date +%d%m%y)"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Test
        run: go test ./...

      - name: Static binary and tarball
        run: |
          make static VERSION="$VERSION"
          make dist-pack VERSION="$VERSION"

      - name: Standalone executable (chmod +x)
        run: |
          mkdir -p dist
          cp -f reddock dist/reddock
          chmod +x dist/reddock

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reddock-${{ env.VERSION }}
          path: |
            dist/reddock-${{ env.VERSION }}-linux-amd64.tar.gz
            dist/reddock

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }} (${{ steps.ver.outputs.version }})
          files: |
            dist/reddock-${{ env.VERSION }}-linux-amd64.tar.gz
            dist/reddock
          generate_release_notes: true
