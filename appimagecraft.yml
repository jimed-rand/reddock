# https://github.com/TheAssassin/appimagecraft — builds AppImage via linuxdeploy from this repo.
# Requires a prior `make static` so reddock is present at project root (see Makefile / release workflow).
version: 1

project:
  name: io.github.reddock.reddock
  version_command: 'cd "$PROJECT_ROOT" && printf "%s-%s" "$(git rev-list --count HEAD 2>/dev/null || echo 0)" "$(date +%d%m%y)"'

build:
  null:

scripts:
  post_build:
    - |
      set -eux
      test -x "$PROJECT_ROOT/reddock"
      cp -a "$PROJECT_ROOT/reddock" "$BUILD_DIR/reddock"

appimage:
  linuxdeploy:
    extra_args: -d "$PROJECT_ROOT"/packaging/appimage/reddock.desktop -e "$BUILD_DIR"/reddock
    raw_environment:
      - OUTPUT=reddock-x86_64.AppImage
